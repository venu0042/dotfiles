general {
    fractional_scaling = 2
    immediate_render = true
}

background {
    monitor =
    # Updated automatically by update_lock_wallpaper.sh script
    # Extension matches your current wallpaper (png/jpg)
    path = /home/venunisandhan/.config/hypr/hyprlock/riot_04.jpg
    
    # Fallback color if image fails
    color = $background
    #blur_size = 1
    #blur_passes = 1
    noise = 0.0117
    contrast = 1.2
    brightness = 0.5
    vibrancy = 0.21
    vibrancy_darkness = 0.0
    fill_mode = stretch
}

# Hours - Lofi minimalist design
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H") </big></b>"
    color = $on_secondary_container
    font_size = 112
    font_family = Adwaita Sans
    shadow_passes = 0
    shadow_size = 0
    position = 0, 220
    halign = center
    valign = center
}

# Minutes
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%M") </big></b>"
    color = $on_secondary_container
    font_size = 112
    font_family = Adwaita Sans
    shadow_passes = 0
    shadow_size = 0
    position = 0, 80
    halign = center
    valign = center
}

# Day of week
label {
    monitor =
    text = cmd[update:18000000] echo "<b><big> "$(date +'%A')" </big></b>"
    color = $secondary
    font_size = 18
    font_family = JetBrainsMono NFM
    position = 0, -15
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%d %b')" </b>"
    color = $secondary
    font_size = 14
    font_family = JetBrainsMono Nerd Font 10
    position = 0, -40
    halign = center
    valign = center
}

# Password input field - Clean lofi design
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.26
    dots_spacing = 0.64
    dots_center = true
    dots_rounding = -1
    rounding = 22
    outer_color = $primary
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = $secondary
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, 120
    halign = center
    valign = bottom
}
