# FIXED VERSION - Ready to use!
# source = colors.conf  # Commented out - using direct colors instead
$Scripts = $HOME/.config/hypr/scripts
general {
    # grace = 1  # Not supported in this version
    fractional_scaling = 2
    immediate_render = true
}
background {
    monitor =
   
    path = ~/.config/hypr/hyprlock/arch_linux.png
    
    color = rgb(0,0,0) # color will be rendered initially until path is available
    noise = 0.0117
    contrast = 1.3000 # Vibrant!!!
    brightness = 0.6000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}
# Hours
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H") </big></b>"
    color = rgb(255, 255, 255)
    font_size = 112
    font_family = SF Pro Display Bold
    shadow_passes = 0
    shadow_size = 0
    position = 500, 120
    halign = center
    valign = center
}
# Minutes
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%M") </big></b>"
    color = rgb(255, 255, 255)
    font_size = 112
    font_family = SF Pro Display Bold
    shadow_passes = 0
    shadow_size = 0
    position = 500, -20
    halign = center
    valign = center
}
# Today
label {
    monitor =
    text = cmd[update:18000000] echo "<b><big> "$(date +'%A')" </big></b>"
    color = rgb(200, 200, 200)
    font_size = 18
    font_family = JetBrains Mono
    position = 500, -115
    halign = center
    valign = center
}
# Week
label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%d %b')" </b>"
    color = rgb(200, 200, 200)
    font_size = 14
    font_family = JetBrains Mono
    position = 500, -140
    halign = center
    valign = center
}
# INPUT FIELD
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.26 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.64 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    dots_rounding = -1
    rounding = 22
    outer_color = rgb(168, 85, 247)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(200, 200, 200)
    fade_on_empty = true
    placeholder_text = <i>Password...</i> # Text rendered in the input box when it's empty.
    position = 0, 120
    halign = center
    valign = bottom
}